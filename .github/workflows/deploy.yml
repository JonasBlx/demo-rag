name: CI/CD

on:
  push:
    branches: [dev, main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      # Build the image (this also runs ingestion — catches dead doc URLs / broken
      # extraction), then run the smoke tests inside it.
      - name: Build image
        run: docker build -t demo-rag .
      - name: Smoke tests
        run: |
          docker run --rm -v "$PWD/tests:/home/user/app/tests" demo-rag \
            sh -c "pip install -q pytest && python -m pytest tests/ -q"
      # Advisory: surfaces known CVEs in installed deps without blocking deploy.
      - name: Dependency vulnerability scan
        continue-on-error: true
        run: |
          docker run --rm demo-rag \
            sh -c "pip install -q pip-audit && pip-audit"

  deploy:
    needs: test
    # Deploy from dev (validate live) and main. Skipped until HF_SPACE is set,
    # so it never fails before you've configured the Space.
    if: >-
      (github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/main')
      && vars.HF_SPACE != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      # Mirror main to the Hugging Face Space; HF rebuilds the Docker image.
      # Requires repo variables HF_USERNAME / HF_SPACE and secret HF_TOKEN.
      - name: Deploy to Hugging Face Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # HF needs its config as YAML frontmatter atop the Space's README. The
          # GitHub README stays clean; inject the header into the Space copy only.
          cat .hf/header.md README.md > README.hf && mv README.hf README.md
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git commit -aqm "chore: inject Space frontmatter"
          # Push the checked-out commit (dev or main) to the Space's main branch.
          git push --force \
            "https://${{ vars.HF_USERNAME }}:${HF_TOKEN}@huggingface.co/spaces/${{ vars.HF_USERNAME }}/${{ vars.HF_SPACE }}" \
            HEAD:main
